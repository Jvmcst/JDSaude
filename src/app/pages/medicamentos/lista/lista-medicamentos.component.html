<div class="page-wrapper">

  <header class="page-header">
    <div>
      <h1 class="page-titulo">Medicamentos</h1>
      <p class="page-sub">{{ medicamentosFiltrados.length }} medicamento(s) encontrado(s)</p>
    </div>
    <a routerLink="/medicamentos/novo" class="btn-novo">
      <i class="bi bi-plus-lg me-2"></i>Novo medicamento
    </a>
  </header>

  <div class="filtros-bar">
    <div class="search-wrap">
      <i class="bi bi-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        [(ngModel)]="busca"
        (ngModelChange)="paginaAtual = 1"
        placeholder="Buscar por nome ou descrição..."
      />
      <button *ngIf="busca" class="search-clear" (click)="busca = ''; paginaAtual = 1">
        <i class="bi bi-x"></i>
      </button>
    </div>
  </div>

  <div class="alert-erro" *ngIf="erro">
    <i class="bi bi-exclamation-circle-fill me-2"></i>{{ erro }}
    <button class="btn-retry ms-3" (click)="carregar()">Tentar novamente</button>
  </div>

  <div class="loading-state" *ngIf="carregando">
    <span class="spinner-border spinner-border-sm me-2" style="color:#5ADB94"></span>
    Carregando medicamentos...
  </div>

  <div class="table-wrap" *ngIf="!carregando && !erro">

    <div class="empty-state" *ngIf="medicamentosFiltrados.length === 0">
      <i class="bi bi-capsule"></i>
      <p>Nenhum medicamento encontrado.</p>
      <a routerLink="/medicamentos/novo" class="btn-novo-sm">Cadastrar primeiro medicamento</a>
    </div>

    <table class="jd-table" *ngIf="medicamentosFiltrados.length > 0">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th class="th-acoes">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of paginado">
          <td class="td-id">{{ m.id }}</td>
          <td>
            <div class="med-cell">
              <div class="med-icon"><i class="bi bi-capsule-pill"></i></div>
              <span class="med-nome">{{ m.nome }}</span>
            </div>
          </td>
          <td class="td-desc">{{ m.descricao || '—' }}</td>
          <td class="td-acoes">
            <a [routerLink]="['/medicamentos', m.id, 'editar']" class="btn-ac btn-editar" title="Editar">
              <i class="bi bi-pencil"></i>
            </a>
            <button class="btn-ac btn-del" title="Excluir" (click)="abrirExcluir(m)">
              <i class="bi bi-trash3"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="paginacao" *ngIf="totalPaginas > 1">
      <button class="pg-btn" [disabled]="paginaAtual === 1" (click)="paginaAtual = paginaAtual - 1">
        <i class="bi bi-chevron-left"></i>
      </button>
      <button
        *ngFor="let p of paginas"
        class="pg-btn"
        [class.active]="p === paginaAtual"
        (click)="paginaAtual = p"
      >{{ p }}</button>
      <button class="pg-btn" [disabled]="paginaAtual === totalPaginas" (click)="paginaAtual = paginaAtual + 1">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>

  </div>

</div>

<app-confirm-modal
  [visivel]="modalExcluir"
  titulo="Excluir medicamento"
  [mensagem]="'Deseja excluir ' + (medicamentoSelecionado?.nome ?? '') + '? Esta ação não pode ser desfeita.'"
  tipo="perigo"
  labelConfirmar="Excluir"
  [carregando]="excluindo"
  (confirmado)="confirmarExcluir()"
  (fechado)="modalExcluir = false"
></app-confirm-modal>
